version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - errorlint
    - misspell
    - unconvert
    - bodyclose
    - revive

  settings:
    errcheck:
      check-type-assertions: true
    revive:
      rules:
        - name: var-naming
          disabled: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
